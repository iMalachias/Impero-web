<!DOCTYPE html>
<html>
<head>
  <base href="/Impero-web/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="S.P.Q.R. - Impero in Crescita">
  <meta name="viewport" content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Impero in Crescita">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>S.P.Q.R. - Impero in Crescita</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background-color: #1a1410;
    }
    #caricamento-spqr {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #2a0f0f 0%, #1a1410 100%);
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    #caricamento-spqr h1 {
      color: #C9A227;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 2rem;
      letter-spacing: 5px;
      margin: 0 0 24px 0;
    }
    #caricamento-spqr .sottotitolo {
      color: #E8D9B0;
      font-family: Georgia, serif;
      font-size: 0.9rem;
      margin-top: 14px;
      opacity: 0.8;
    }
    .spqr-spinner {
      width: 46px;
      height: 46px;
      border: 4px solid rgba(201, 162, 39, 0.25);
      border-top-color: #C9A227;
      border-radius: 50%;
      animation: spqr-girare 1s linear infinite;
    }
    @keyframes spqr-girare {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="caricamento-spqr">
    <h1>S.P.Q.R.</h1>
    <div class="spqr-spinner"></div>
    <div class="sottotitolo">Roma si sta risvegliando...</div>
  </div>

  <script>
    // Nasconde la schermata di caricamento dopo un tempo ragionevole.
    setTimeout(function () {
      var el = document.getElementById('caricamento-spqr');
      if (el) {
        el.style.opacity = '0';
        setTimeout(function () { el.remove(); }, 500);
      }
    }, 3500);
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
